<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 決策大轉盤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #wheel {
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .wheel-container {
            width: 300px;
            height: 300px;
            position: relative;
        }
        /* 指針 */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center p-6 min-h-screen">

    <h1 class="text-2xl font-bold mb-8 text-gray-800">🎡 幸運大轉盤</h1>

    <div class="wheel-container mb-8">
        <div class="pointer"></div>
        <canvas id="wheel" width="300" height="300" class="rounded-full border-4 border-white shadow-2xl"></canvas>
    </div>

    <button onclick="spinWheel()" id="spinBtn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-10 rounded-full shadow-lg text-xl mb-8 active:scale-95 transition">
        開始旋轉
    </button>

    <div class="w-full max-w-sm bg-white rounded-2xl p-6 shadow-md">
        <h3 class="font-bold mb-4 flex justify-between">
            <span>編輯轉盤內容</span>
            <span id="itemCount" class="text-gray-400 text-sm"></span>
        </h3>
        <div id="itemList" class="space-y-2 mb-4 max-h-48 overflow-y-auto">
            </div>
        <div class="flex gap-2">
            <input id="newItem" type="text" placeholder="新增選項..." class="flex-1 border p-2 rounded-lg">
            <button onclick="addItem()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">加入</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        let items = JSON.parse(localStorage.getItem('wheelItems')) || ['台積電', '聯發科', '鴻海', '輝達', '特斯拉'];
        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel() {
            const numSegments = items.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            items.forEach((item, i) => {
                const startAngle = i * anglePerSegment;
                const endAngle = (i + 1) * anglePerSegment;

                // 畫扇形
                ctx.beginPath();
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, startAngle, endAngle);
                ctx.fillStyle = `hsl(${(i * 360) / numSegments}, 70%, 65%)`;
                ctx.fill();
                ctx.stroke();

                // 畫文字
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 16px sans-serif";
                ctx.fillText(item, 140, 10);
                ctx.restore();
            });
            updateItemList();
        }

        function spinWheel() {
            if (isSpinning || items.length < 2) return;
            isSpinning = true;
            
            // 隨機旋轉圈數 (至少 5 圈) + 隨機角度
            const extraDegree = Math.floor(Math.random() * 360);
            const totalSpin = 1800 + extraDegree; 
            currentRotation += totalSpin;

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                alert("結果出爐！");
            }, 4000);
        }

        function addItem() {
            const input = document.getElementById('newItem');
            if (input.value.trim()) {
                items.push(input.value.trim());
                input.value = '';
                saveAndRender();
            }
        }

        function deleteItem(index) {
            items.splice(index, 1);
            saveAndRender();
        }

        function updateItemList() {
            const list = document.getElementById('itemList');
            document.getElementById('itemCount').innerText = `${items.length} 個選項`;
            list.innerHTML = items.map((item, index) => `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded">
                    <span class="text-sm">${item}</span>
                    <button onclick="deleteItem(${index})" class="text-red-400 text-xs">刪除</button>
                </div>
            `).join('');
        }

        function saveAndRender() {
            localStorage.setItem('wheelItems', JSON.stringify(items));
            drawWheel();
        }

        drawWheel();
    </script>
</body>
</html>
